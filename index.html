<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Weekend</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --fri: #e8c547;
    --sat: #f0855a;
    --sun: #6ab4f5;
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #242220;
    --text: #f0ede6;
    --muted: #6b6860;
    --border: #2e2c29;
    --boyle: #c8a96e;
    --todo: #7ec896;
    --nav-h: 56px;
    --bottom-nav-h: calc(60px + env(safe-area-inset-bottom, 20px));
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text);
    min-height: 100dvh;
    padding-bottom: var(--bottom-nav-h);
    /* prevent any child from blowing out width */
    max-width: 100vw;
  }

  /* ── TOP NAV (desktop only) ── */
  .top-nav {
    display: flex; align-items: center;
    padding: 0 1.5rem; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 50;
    height: var(--nav-h);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.15rem;
    color: var(--fri); padding-right: 1.25rem; border-right: 1px solid var(--border);
    margin-right: 0.75rem; white-space: nowrap; line-height: 1;
  }
  .nav-tabs { display: flex; flex: 1; height: 100%; }
  .nav-tab {
    padding: 0 1rem; font-family: 'DM Mono', monospace; font-size: 0.68rem;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
    background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: color 0.2s, border-color 0.2s; white-space: nowrap;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .nav-tab .tab-icon { font-size: 1rem; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active[data-page="schedule"] { color: var(--fri); border-bottom-color: var(--fri); }
  .nav-tab.active[data-page="todo"]     { color: var(--todo); border-bottom-color: var(--todo); }
  .nav-tab.active[data-page="boyle"]    { color: var(--boyle); border-bottom-color: var(--boyle); }

  /* ── MOBILE TOP BAR ── */
  .mobile-top-bar {
    display: none;
    position: sticky; top: 0; z-index: 50;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding-top: env(safe-area-inset-top);
    padding-left: env(safe-area-inset-left, 0px);
    padding-right: env(safe-area-inset-right, 0px);
    width: 100%;
    flex-direction: column;
  }
  /* Row 1: App name only */
  .mobile-top-row1 {
    display: flex; align-items: center;
    padding: 0.5rem 1rem 0.15rem;
  }
  .mobile-top-bar .app-name {
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: 1.3rem; color: var(--fri); line-height: 1;
  }
  /* Row 2: vibe pill + week nav / action button */
  .mobile-top-row2 {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0 1rem 0.55rem;
  }
  #vibe-pill {
    font-size: 0.58rem; padding: 0.2rem 0.65rem; border-radius: 20px;
    font-family: 'DM Mono', monospace; font-weight: 500; letter-spacing: 0.05em;
    flex-shrink: 0; white-space: nowrap;
  }
  /* Week nav inside mobile top bar */
  .mobile-week-nav {
    display: none; align-items: center; gap: 0.35rem; margin-left: auto; flex-shrink: 0;
  }
  .mobile-week-nav.visible { display: flex; }
  .mobile-week-nav button {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 0.95rem;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .mobile-week-nav button:active { transform: scale(0.88); opacity: 0.7; }
  #mobile-week-label {
    font-size: 0.56rem; text-align: center; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--muted); white-space: nowrap;
  }
  /* Action button in top bar (e.g. + Log Review) */
  .mobile-top-action {
    display: none; flex-shrink: 0; margin-left: auto;
    padding: 0.38rem 0.8rem; border: none; border-radius: 8px;
    font-family: 'DM Mono', monospace; font-size: 0.65rem; font-weight: 500;
    color: #0f0e0c; cursor: pointer; white-space: nowrap; min-height: 32px;
  }
  .mobile-top-action.visible { display: flex; align-items: center; }
  .mobile-top-action:active { opacity: 0.7; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  .bottom-nav-inner {
    display: grid; grid-template-columns: repeat(4, 1fr);
    height: 60px;
  }
  /* This block fills the gap between nav and physical screen edge */
  .bottom-nav-fill {
    height: env(safe-area-inset-bottom, 20px);
    background: var(--surface);
  }
  .bottom-tab {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; background: none; border: none; cursor: pointer;
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 0.55rem; letter-spacing: 0.08em; text-transform: uppercase;
    transition: color 0.15s; padding: 0;
  }
  .bottom-tab .b-icon { font-size: 1.3rem; line-height: 1; }
  .bottom-tab.active[data-page="schedule"] { color: var(--fri); }
  .bottom-tab.active[data-page="todo"]     { color: var(--todo); }
  .bottom-tab.active[data-page="boyle"]    { color: var(--boyle); }
  .bottom-tab.active[data-page="settings"] { color: var(--muted); filter: brightness(1.8); }

  /* ── SETTINGS ── */
  .settings-wrap { max-width: 480px; padding-bottom: 2rem; }
  .settings-title {
    font-family: 'Playfair Display', serif; font-size: clamp(1.4rem,5vw,2.4rem);
    font-style: italic; margin-bottom: 2rem;
    padding-bottom: 0.9rem; border-bottom: 1px solid var(--border);
  }
  .settings-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .settings-section-label {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 0.4rem;
  }
  .settings-section-desc {
    font-size: 0.8rem; color: var(--text); line-height: 1.5; opacity: 0.75;
  }

  /* ── PAGES ── */
  .page { display: none; padding: 1rem; width: 100%; }
  .page.active { display: block; }

  /* ── SCHEDULE ── */
  .schedule-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem;
  }
  .schedule-title { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem,5vw,2.4rem); font-style: italic; }
  .week-nav { display: flex; align-items: center; gap: 0.5rem; color: var(--muted); }
  .week-nav button {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .week-nav button:active { transform: scale(0.92); opacity: 0.7; }
  #week-label { font-size: 0.62rem; text-align: center; text-transform: uppercase; letter-spacing: 0.1em; min-width: 100px; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

  .day-col { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
  .day-header { padding: 0.85rem 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .day-header .day-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
  .day-header .day-date { font-size: 0.58rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .fri .day-header { background: color-mix(in srgb, var(--fri) 9%, var(--surface)); }
  .sat .day-header { background: color-mix(in srgb, var(--sat) 9%, var(--surface)); }
  .sun .day-header { background: color-mix(in srgb, var(--sun) 9%, var(--surface)); }
  .fri .day-name { color: var(--fri); } .sat .day-name { color: var(--sat); } .sun .day-name { color: var(--sun); }
  .fri .dot { background: var(--fri); } .sat .dot { background: var(--sat); } .sun .dot { background: var(--sun); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .events-list { flex: 1; padding: 0.65rem; display: flex; flex-direction: column; gap: 0.5rem; min-height: 70px; }
  .event-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.65rem 2.4rem 0.65rem 0.75rem; position: relative; animation: slideIn 0.22s ease;
  }
  .event-time { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 0.15rem; text-transform: uppercase; }
  .event-title { font-size: 0.85rem; font-weight: 500; color: var(--text); line-height: 1.3; word-break: break-word; }
  .event-meta { font-size: 0.62rem; color: var(--muted); margin-top: 0.25rem; word-break: break-word; }
  .event-delete {
    position: absolute; top: 50%; right: 0.4rem; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 1.2rem; line-height: 1;
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  }
  .event-delete:active { color: #e05a5a; }
  /* Edit button on event card */
  .event-edit {
    position: absolute; top: 0.4rem; right: 0.4rem;
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.75rem; letter-spacing: 0.04em;
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
  }
  .event-edit:active { color: var(--text); background: var(--surface); }
  /* On mobile both edit+delete always visible; on desktop via hover */
  .event-card { padding: 0.65rem 4.4rem 0.65rem 0.75rem; }
  .event-wear { font-size: 0.62rem; color: var(--boyle); margin-top: 0.25rem; }
  .add-btn {
    margin: 0 0.65rem 0.65rem; padding: 0.65rem; background: none; border: 1px dashed var(--border);
    color: var(--muted); border-radius: 8px; cursor: pointer; font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.08em; width: calc(100% - 1.3rem); min-height: 42px;
  }
  .add-btn:active { opacity: 0.6; }
  .empty-state { color: var(--muted); font-size: 0.68rem; text-align: center; padding: 1.25rem 1rem; opacity: 0.6; font-style: italic; }

  /* ── TO-DO ── */
  .todo-header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 1.25rem; padding-bottom: 0.9rem; border-bottom: 1px solid var(--border);
  }
  .todo-title { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem,5vw,2.4rem); font-style: italic; }
  .todo-title span { color: var(--todo); }
  .todo-stats { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.06em; flex-shrink: 0; }
  .todo-add-row { display: flex; gap: 0.6rem; margin-bottom: 1rem; }
  .todo-add-row input {
    flex: 1; min-width: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); padding: 0.8rem 1rem; font-family: 'DM Mono', monospace;
    font-size: max(16px, 0.87rem); outline: none; transition: border-color 0.2s;
  }
  .todo-add-row input:focus { border-color: var(--todo); }
  .todo-add-row input::placeholder { color: var(--muted); }
  .todo-add-btn {
    padding: 0.8rem 1rem; background: var(--todo); border: none; border-radius: 10px;
    color: #0f0e0c; font-family: 'DM Mono', monospace; font-size: 0.78rem; font-weight: 500;
    cursor: pointer; white-space: nowrap; min-height: 48px; flex-shrink: 0;
  }
  .todo-add-btn:active { opacity: 0.75; }
  .todo-filters { display: flex; gap: 0.4rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn {
    padding: 0.4rem 0.9rem; background: none; border: 1px solid var(--border);
    border-radius: 20px; color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; text-transform: uppercase;
    min-height: 36px;
  }
  .filter-btn.active { background: var(--todo); border-color: var(--todo); color: #0f0e0c; }
  .todo-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .todo-item {
    display: flex; align-items: center; gap: 0.75rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 0.85rem;
    animation: slideIn 0.2s ease;
  }
  .todo-item.done { opacity: 0.45; }
  .todo-check {
    width: 26px; height: 26px; min-width: 26px; border: 2px solid var(--border); border-radius: 50%;
    cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    background: none; transition: all 0.2s;
  }
  .todo-item.done .todo-check { background: var(--todo); border-color: var(--todo); }
  .todo-check-inner { width: 9px; height: 9px; background: #0f0e0c; border-radius: 50%; opacity: 0; transition: opacity 0.15s; }
  .todo-item.done .todo-check-inner { opacity: 1; }
  .todo-text { flex: 1; min-width: 0; font-size: 0.88rem; color: var(--text); line-height: 1.35; word-break: break-word; }
  .todo-item.done .todo-text { text-decoration: line-through; color: var(--muted); }
  .todo-date { font-size: 0.6rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .todo-del {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 1.1rem; line-height: 1; flex-shrink: 0;
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  }
  .todo-del:active { color: #e05a5a; }
  .todo-empty { color: var(--muted); font-size: 0.78rem; text-align: center; padding: 3rem 1rem; font-style: italic; opacity: 0.6; }

  /* Vibe picker (add row) */
  .todo-vibe-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
  .vibe-btn {
    padding: 0.42rem 1rem; background: none; border: 1px solid var(--border);
    border-radius: 20px; color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 0.72rem; cursor: pointer; transition: all 0.15s; min-height: 36px;
  }
  .vibe-btn.active[data-vibe="home"] { background: color-mix(in srgb, #a8d8a8 12%, var(--surface2)); border-color: #a8d8a8; color: #a8d8a8; }
  .vibe-btn.active[data-vibe="date"] { background: color-mix(in srgb, var(--sat) 12%, var(--surface2)); border-color: var(--sat); color: var(--sat); }
  .vibe-btn:active { opacity: 0.7; }

  /* Vibe tag on todo item */
  .todo-vibe-tag {
    font-size: 0.58rem; padding: 0.12rem 0.5rem; border-radius: 20px; font-weight: 500;
    white-space: nowrap; flex-shrink: 0; letter-spacing: 0.03em;
  }
  .vibe-home { background: color-mix(in srgb, #a8d8a8 12%, transparent); color: #a8d8a8; }
  .vibe-date { background: color-mix(in srgb, var(--sat) 12%, transparent); color: var(--sat); }
  /* Added-by meta text on todo */
  .todo-added-meta {
    font-size: 0.6rem; color: var(--muted); font-style: italic; letter-spacing: 0.02em;
  }

  /* Filter divider */
  .filter-divider { width: 1px; background: var(--border); margin: 0.2rem 0.15rem; align-self: stretch; }

  /* ── BOYLE ── */
  .boyle-wrap { max-width: 960px; }
  .boyle-header {
    display: flex; gap: 1rem; align-items: center;
    margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border);
  }
  .boyle-badge {
    font-family: 'Caveat', cursive; font-size: 3rem; font-weight: 700; color: var(--boyle);
    line-height: 1; flex-shrink: 0; text-shadow: 0 0 30px color-mix(in srgb, var(--boyle) 25%, transparent);
  }
  .boyle-title { font-family: 'Playfair Display', serif; font-size: clamp(1.2rem,4vw,2.2rem); font-style: italic; line-height: 1.1; }
  .boyle-title span { color: var(--boyle); }
  .boyle-subtitle { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.3rem; }
  .boyle-add-btn {
    margin-left: auto; padding: 0.7rem 1rem; background: var(--boyle); border: none;
    border-radius: 10px; color: #0f0e0c; font-family: 'DM Mono', monospace; font-size: 0.72rem;
    font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0; min-height: 44px;
  }
  .boyle-add-btn:active { opacity: 0.75; }

  .reviews-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  .review-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; animation: slideIn 0.25s ease; position: relative;
  }
  .review-card-top {
    background: color-mix(in srgb, var(--boyle) 8%, var(--surface));
    padding: 1rem 1.1rem 0.8rem; border-bottom: 1px solid var(--border);
  }
  .review-restaurant { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; color: var(--text); line-height: 1.2; padding-right: 1.5rem; word-break: break-word; }
  .review-cuisine { font-size: 0.6rem; color: var(--boyle); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.2rem; }
  .boyle-score { font-family: 'Caveat', cursive; font-size: 1.3rem; color: var(--boyle); margin-left: 0.5rem; font-weight: 700; }
  .review-body { padding: 0.9rem 1.1rem; }
  .review-quote { font-family: 'Caveat', cursive; font-size: 1.02rem; color: #d4cfc6; line-height: 1.45; word-break: break-word; }
  .review-footer { display: flex; justify-content: space-between; align-items: center; padding: 0.65rem 1.1rem; border-top: 1px solid var(--border); gap: 0.5rem; }
  .review-date { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.06em; flex-shrink: 0; }
  .review-revisit { font-size: 0.6rem; padding: 0.18rem 0.55rem; border-radius: 20px; font-weight: 500; flex-shrink: 0; }
  .rv-yes { background: color-mix(in srgb, var(--todo) 15%, transparent); color: var(--todo); }
  .rv-no { background: color-mix(in srgb, #e05a5a 15%, transparent); color: #e05a5a; }
  .rv-maybe { background: color-mix(in srgb, var(--fri) 15%, transparent); color: var(--fri); }
  .review-del {
    position: absolute; top: 0.5rem; right: 0.6rem; background: none; border: none;
    color: var(--muted); cursor: pointer; font-size: 1rem;
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  }
  .review-del:active { color: #e05a5a; }
  .reviews-empty { text-align: center; padding: 3rem 1.5rem; color: var(--muted); font-style: italic; opacity: 0.6; grid-column: 1/-1; }
  .reviews-empty .big { font-family: 'Caveat', cursive; font-size: 3.5rem; font-weight: 700; color: var(--boyle); opacity: 0.35; display: block; margin-bottom: 0.5rem; }

  /* Criteria sliders */
  .criterion-row { display: grid; grid-template-columns: 85px 1fr 32px; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .criterion-label { font-size: 0.65rem; color: var(--text); letter-spacing: 0.03em; text-transform: capitalize; }
  .criterion-slider {
    -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
    background: var(--border); border-radius: 3px; outline: none; cursor: pointer;
  }
  .criterion-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
    background: var(--boyle); cursor: pointer;
  }
  .criterion-slider::-moz-range-thumb { width:22px; height:22px; border-radius:50%; background:var(--boyle); cursor:pointer; border:none; }
  .criterion-val { font-family:'Caveat',cursive; font-size:1.1rem; color:var(--boyle); font-weight:700; text-align:right; }

  /* Card criteria bars */
  .criteria-bars { padding: 0.75rem 1.1rem; display:flex; flex-direction:column; gap:0.4rem; }
  .crit-bar-row { display:grid; grid-template-columns: 75px 1fr 26px; align-items:center; gap:0.4rem; }
  .crit-bar-label { font-size:0.58rem; color:var(--muted); text-transform:capitalize; letter-spacing:0.02em; }
  .crit-bar-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .crit-bar-fill { height:100%; border-radius:2px; background:var(--boyle); }
  .crit-bar-val { font-family:'Caveat',cursive; font-size:0.82rem; color:var(--boyle); font-weight:700; text-align:right; }

<script>
// ── SUPABASE ──
const SUPABASE_URL = 'https://edyuizgeyqrnkijvvufx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkeXVpemdleXFybmtpanZ2dWZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjkxMTcsImV4cCI6MjA4NjQwNTExN30.8zVQP7LbZaj6DOu7KL_tJSjvrDTpHxjTDWL7fMZeaLk';

async function sb(table, method='GET', body=null, params='') {
  const url = `${SUPABASE_URL}/rest/v1/${table}${params}`;
  const res = await fetch(url, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation' : method==='PATCH' ? 'return=representation' : '',
    },
    body: body ? JSON.stringify(body) : null
  });
  if (!res.ok) { const e = await res.text(); console.error('Supabase error:', e); throw new Error(e); }
  if (method === 'DELETE' || res.status === 204) return null;
  return res.json();
}

// ── UTILS ──
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#7ec896' : '#e05a5a';
  t.style.color = '#0f0e0c';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function setLoading(id, on) {
  const el = document.getElementById(id);
  if (el) el.style.opacity = on ? '0.5' : '1';
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab, .bottom-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll(`[data-page="${p}"]`).forEach(el => el.classList.add('active'));
  // Mobile top bar context switching
  const weekNav = document.getElementById('mobile-week-nav');
  const action = document.getElementById('mobile-top-action');
  if (weekNav) weekNav.classList.toggle('visible', p === 'schedule');
  if (action) action.classList.toggle('visible', p === 'boyle');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(mo => {
  mo.addEventListener('click', e => { if (e.target===mo) mo.classList.remove('open'); });
});

// ── SCHEDULE ──
const DAY_NAMES=['Friday','Saturday','Sunday'], DAY_KEYS=['fri','sat','sun'];

// Offset 0 = this week = date weekend. Even offsets = date, odd offsets = home.
// We normalise so that negative offsets also alternate correctly.
function getWeekVibe(offset) {
  // Use a fixed reference: weekOffset 0 is "date". Mod 2 with correct handling for negatives.
  return ((offset % 2) + 2) % 2 === 0 ? 'date' : 'home';
}

// Date weekend: ocean & ice — deep teal, sky blue, ice blue
const DATE_COLORS = { fri:'#1a8a9a', sat:'#4db8d4', sun:'#a8dce8' };
const DATE_VIBE_LABEL = '🌙 Going Out';
const DATE_VIBE_COLOR = '#4db8d4';

// Home weekend: forest & moss — deep forest green, moss, warm ochre
const HOME_COLORS = { fri:'#4a7c59', sat:'#7aab6e', sun:'#a8d5a2' };
const HOME_VIBE_LABEL = '🏠 Home Weekend';
const HOME_VIBE_COLOR = '#7aab6e';

function getVibeColors(offset) {
  return getWeekVibe(offset) === 'date' ? DATE_COLORS : HOME_COLORS;
}

let weekOffset=0, schedDay=null, schedWk=null, editingEvId=null;

function getWeekDates(o) {
  const now=new Date(), day=now.getDay(), dToFri=(5-day+7)%7;
  const fri=new Date(now); fri.setDate(now.getDate()+dToFri+o*7); fri.setHours(0,0,0,0);
  const sat=new Date(fri); sat.setDate(fri.getDate()+1);
  const sun=new Date(fri); sun.setDate(fri.getDate()+2);
  return [fri,sat,sun];
}
function weekStr(o) { return getWeekDates(o)[0].toISOString().slice(0,10); }
function weekLabel(o) {
  const [f,,s]=getWeekDates(o), fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return fmt(f)+' – '+fmt(s);
}
function fmtTime(t) {
  if(!t) return ''; const [h,m]=t.split(':').map(Number);
  return (h%12||12)+':'+String(m).padStart(2,'0')+' '+(h>=12?'PM':'AM');
}
function fmtTimeRange(start, end) {
  if (!start && !end) return '';
  if (start && end) return fmtTime(start) + ' – ' + fmtTime(end);
  return fmtTime(start || end);
}
function changeWeek(d){ weekOffset+=d; renderSchedule(); }

async function renderSchedule() {
  const lbl = weekLabel(weekOffset);
  document.getElementById('week-label').textContent = lbl;
  const mLbl = document.getElementById('mobile-week-label');
  if (mLbl) mLbl.textContent = lbl;

  const vibe = getWeekVibe(weekOffset);
  const COLORS = getVibeColors(weekOffset);
  const vibeLabel = vibe === 'date' ? DATE_VIBE_LABEL : HOME_VIBE_LABEL;
  const vibeAccent = vibe === 'date' ? DATE_VIBE_COLOR : HOME_VIBE_COLOR;

  // Update mobile top bar vibe pill
  const vibePill = document.getElementById('vibe-pill');
  if (vibePill) {
    vibePill.textContent = vibeLabel;
    vibePill.style.background = `color-mix(in srgb, ${vibeAccent} 15%, var(--surface2))`;
    vibePill.style.color = vibeAccent;
    vibePill.style.border = `1px solid color-mix(in srgb, ${vibeAccent} 30%, transparent)`;
  }

  // Inject per-week CSS custom properties so all day-colour rules pick them up
  let styleTag = document.getElementById('week-vibe-style');
  if (!styleTag) { styleTag = document.createElement('style'); styleTag.id='week-vibe-style'; document.head.appendChild(styleTag); }
  styleTag.textContent = `
    :root {
      --fri: ${COLORS.fri};
      --sat: ${COLORS.sat};
      --sun: ${COLORS.sun};
    }
  `;

  const wk=weekStr(weekOffset), dates=getWeekDates(weekOffset);
  const grid=document.getElementById('sched-grid');
  grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:2rem;font-size:0.8rem">Loading...</div>`;

  let evs = [];
  try {
    evs = await sb('schedule_events','GET',null,`?week_start=eq.${wk}&order=event_time.asc.nullslast`);
  } catch(e) { toast('Failed to load schedule','error'); evs=[]; }

  grid.innerHTML='';

  // Vibe banner below week nav on desktop / top of page on mobile
  const banner = document.createElement('div');
  banner.style.cssText = `grid-column:1/-1;display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:${vibeAccent};font-family:'DM Mono',monospace;`;
  banner.innerHTML = `<span style="font-size:1rem">${vibe==='date'?'🌙':'🏠'}</span> ${vibe==='date'?'Going Out Weekend':'Home Weekend'}`;
  grid.appendChild(banner);

  DAY_KEYS.forEach((dk,i)=>{
    const dayEvs = evs.filter(e=>e.day===dk);
    const col=document.createElement('div'); col.className='day-col '+dk;
    const evHtml=dayEvs.length===0?'<div class="empty-state">nothing yet...</div>':dayEvs.map(ev=>`
      <div class="event-card">
        <button class="event-edit" onclick="openEditModal(${JSON.stringify(ev).replace(/"/g,'&quot;')})" title="Edit">✎</button>
        <button class="event-delete" onclick="delSchedEv('${ev.id}')" title="Delete">×</button>
        ${fmtTimeRange(ev.event_time, ev.end_time)?'<div class="event-time">'+fmtTimeRange(ev.event_time, ev.end_time)+'</div>':''}
        <div class="event-title">${escH(ev.title)}</div>
        ${ev.wear?'<div class="event-wear">👗 '+escH(ev.wear)+'</div>':''}
        ${ev.who?'<div class="event-meta">👥 '+escH(ev.who)+'</div>':''}
        ${ev.notes?'<div class="event-meta">📍 '+escH(ev.notes)+'</div>':''}
        ${ev.added_by?`<span class="event-added-by added-${ev.added_by.toLowerCase()}">${escH(ev.added_by)}</span>`:''}
      </div>`).join('');
    col.innerHTML=`
      <div class="day-header">
        <div>
          <div class="day-name">${DAY_NAMES[i]}</div>
          <div class="day-date">${dates[i].toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <span style="font-size:.63rem;color:var(--muted)">${dayEvs.length||''}</span>
          <div class="dot"></div>
        </div>
      </div>
      <div class="events-list">${evHtml}</div>
      <button class="add-btn" onclick="openSchedModal('${dk}','${wk}')">+ add event</button>`;
    grid.appendChild(col);
  });
}

function openSchedModal(dk, wk) {
  editingEvId = null;
  schedDay=dk; schedWk=wk;
  const i=DAY_KEYS.indexOf(dk), c=getVibeColors(weekOffset)[dk];
  const titleEl = document.getElementById('sched-modal-title');
  titleEl.innerHTML = 'Add to <span id="sched-modal-day" style="color:'+c+'">'+DAY_NAMES[i]+'</span>';
  document.getElementById('sched-save-btn').style.background=c;
  document.getElementById('sched-save-btn').textContent='Add Event';
  ['sf-title','sf-who','sf-notes','sf-wear'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sf-time').value='';
  document.getElementById('sf-end-time').value='';
  document.getElementById('sched-modal').classList.add('open');
  setTimeout(()=>document.getElementById('sf-title').focus(),100);
}

function openEditModal(ev) {
  editingEvId = ev.id;
  schedDay = ev.day; schedWk = ev.week_start;
  const dk = ev.day, i = DAY_KEYS.indexOf(dk), c = getVibeColors(weekOffset)[dk];
  const titleEl = document.getElementById('sched-modal-title');
  titleEl.innerHTML = 'Edit <span style="color:'+c+'">'+DAY_NAMES[i]+'</span> event';
  const btn = document.getElementById('sched-save-btn');
  btn.style.background = c; btn.textContent = 'Save Changes';
  document.getElementById('sf-title').value = ev.title || '';
  document.getElementById('sf-time').value = ev.event_time || '';
  document.getElementById('sf-end-time').value = ev.end_time || '';
  document.getElementById('sf-wear').value = ev.wear || '';
  document.getElementById('sf-who').value = ev.who || '';
  document.getElementById('sf-notes').value = ev.notes || '';
  selectWho(ev.added_by || 'Almi');
  document.getElementById('sched-modal').classList.add('open');
  setTimeout(()=>document.getElementById('sf-title').focus(),100);
}

async function saveSchedEvent() {
  const title=document.getElementById('sf-title').value.trim();
  if(!title){ document.getElementById('sf-title').style.borderColor='#e05a5a'; return; }
  document.getElementById('sf-title').style.borderColor='';
  const btn=document.getElementById('sched-save-btn');
  const origText = btn.textContent;
  btn.textContent='Saving...'; btn.disabled=true;
  const payload = {
    title,
    event_time: document.getElementById('sf-time').value || null,
    end_time: document.getElementById('sf-end-time').value || null,
    wear: document.getElementById('sf-wear').value.trim() || null,
    who: document.getElementById('sf-who').value.trim() || null,
    notes: document.getElementById('sf-notes').value.trim() || null,
    added_by: editingEvId ? undefined : currentUser,
  };
  try {
    if (editingEvId) {
      await sb('schedule_events','PATCH', payload, `?id=eq.${editingEvId}`);
      toast('Event updated!');
    } else {
      await sb('schedule_events','POST', { week_start: schedWk, day: schedDay, ...payload });
      toast('Event added!');
    }
    closeModal('sched-modal');
    renderSchedule();
  } catch(e) { toast('Failed to save event', false); }
  finally { btn.textContent=origText; btn.disabled=false; }
}

async function delSchedEv(id) {
  try {
    await sb('schedule_events','DELETE',null,`?id=eq.${id}`);
    toast('Event removed');
    renderSchedule();
  } catch(e) { toast('Failed to delete', false); }
}

document.getElementById('sf-title').addEventListener('keydown',e=>{ if(e.key==='Enter') saveSchedEvent(); });

// ── SETTINGS ──
let currentUser = localStorage.getItem('weekend_user') || 'Almi';

function setCurrentUser(name) {
  currentUser = name;
  localStorage.setItem('weekend_user', name);
  document.querySelectorAll('#settings-almi, #settings-alvi').forEach(b =>
    b.classList.toggle('active', b.dataset.who === name)
  );
  toast('Logged in as ' + name + ' ✓');
}

function initSettings() {
  document.querySelectorAll('#settings-almi, #settings-alvi').forEach(b =>
    b.classList.toggle('active', b.dataset.who === currentUser)
  );
}

// ── TODO ──
let todoFilter='all', todoVibe='home';

function selectVibe(v) {
  todoVibe = v;
  document.querySelectorAll('.vibe-btn').forEach(b => b.classList.toggle('active', b.dataset.vibe === v));
}

async function addTodo() {
  const inp=document.getElementById('todo-input'), text=inp.value.trim(); if(!text) return;
  inp.value='';
  try {
    await sb('todos','POST',{ text, done: false, vibe: todoVibe, added_by: currentUser });
    toast('Added to list!');
    renderTodos();
  } catch(e) { toast('Failed to add item', false); inp.value=text; }
}

async function toggleTodo(id, currentDone) {
  try {
    await sb('todos','PATCH',{
      done: !currentDone,
      done_at: !currentDone ? new Date().toISOString() : null
    },`?id=eq.${id}`);
    renderTodos();
  } catch(e) { toast('Failed to update', false); }
}

async function deleteTodo(id) {
  try {
    await sb('todos','DELETE',null,`?id=eq.${id}`);
    toast('Removed from list');
    renderTodos();
  } catch(e) { toast('Failed to delete', false); }
}

function setFilter(f) {
  todoFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));
  renderTodos();
}

const VIBE_LABELS = { home: '🏠 At Home', date: '💃 Date' };
const VIBE_CLS = { home: 'vibe-home', date: 'vibe-date' };

async function renderTodos() {
  const list=document.getElementById('todo-list');
  list.innerHTML='<div class="todo-empty">Loading...</div>';
  let all=[];
  try {
    all = await sb('todos','GET',null,'?order=created_at.desc');
  } catch(e) { toast('Failed to load todos', false); all=[]; }

  let filtered = all;
  if (todoFilter === 'done') filtered = all.filter(t=>t.done);
  else if (todoFilter === 'active') filtered = all.filter(t=>!t.done);
  else if (todoFilter === 'home') filtered = all.filter(t=>t.vibe==='home'||!t.vibe);
  else if (todoFilter === 'date') filtered = all.filter(t=>t.vibe==='date');
  else if (todoFilter === 'almi') filtered = all.filter(t=>t.added_by==='Almi');
  else if (todoFilter === 'alvi') filtered = all.filter(t=>t.added_by==='Alvi');

  const done = all.filter(t=>t.done).length;
  document.getElementById('todo-stats').textContent=done+'/'+all.length+' done';

  if(filtered.length===0){
    const msgs = { done:'nothing done yet...', active:'all clear! 🎉', home:'no at home vibes yet...', date:'no date plans yet...', almi:'nothing from Almi yet...', alvi:'nothing from Alvi yet...' };
    list.innerHTML=`<div class="todo-empty">${msgs[todoFilter]||'the list is empty...'}</div>`; return;
  }
  list.innerHTML=filtered.map(t=>{
    const vibe = t.vibe || 'home';
    const vibeTag = `<span class="todo-vibe-tag ${VIBE_CLS[vibe]}">${VIBE_LABELS[vibe]}</span>`;
    const addedByText = t.added_by ? (() => {
      const d = new Date(t.created_at);
      const time = d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}).toLowerCase();
      const day = d.toLocaleDateString('en-US',{weekday:'long'});
      return `<span class="todo-added-meta">added by ${escH(t.added_by.toLowerCase())} at ${time} on ${day}</span>`;
    })() : '';
    return `
    <div class="todo-item ${t.done?'done':''}">
      <button class="todo-check" onclick="toggleTodo('${t.id}',${t.done})"><div class="todo-check-inner"></div></button>
      <div style="flex:1;min-width:0">
        <div class="todo-text">${escH(t.text)}</div>
        <div style="margin-top:0.3rem;display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center">${vibeTag}${addedByText}</div>
      </div>
      <span class="todo-date">${new Date(t.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
      <button class="todo-del" onclick="deleteTodo('${t.id}')">×</button>
    </div>`;
  }).join('');
}

document.getElementById('todo-input').addEventListener('keydown',e=>{ if(e.key==='Enter') addTodo(); });

// ── BOYLE ──
const CRITERIA = [
  { key:'bitter',      label:'Bitter',      hint:'How bitter is it?' },
  { key:'aftertaste',  label:'Aftertaste',  hint:'What lingers after?' },
  { key:'texture',     label:'Texture',     hint:'Rough? Smooth? Contrast?' },
  { key:'sweet',       label:'Sweet',       hint:'Level of sweetness' },
  { key:'sour',        label:'Sour',        hint:'Any tartness?' },
  { key:'umami',       label:'Umami',       hint:'That deep savouriness' },
  { key:'mouthfeel',   label:'Mouthfeel',   hint:'Buttery? Watery? Velvety?' },
  { key:'odour',       label:'Odour',       hint:'What does it smell like?' },
  { key:'salty',       label:'Salty',       hint:'Salt presence' },
  { key:'presentation',label:'Presentation',hint:'The visual drama' },
  { key:'consistency', label:'Consistency', hint:'Is it what you expected?' },
  { key:'sound',       label:'Sound',       hint:'The acoustic experience' },
  { key:'spice',       label:'Spice',       hint:'Heat level' },
  { key:'astringency', label:'Astringency', hint:'Drying, puckering sensation' },
];

let criteriaScores = {};
let criteriaNotes = {};

function buildCriteriaForm() {
  const el = document.getElementById('criteria-list');
  el.innerHTML = CRITERIA.map(c => `
    <div>
      <div class="criterion-row">
        <div class="criterion-label">${c.label}</div>
        <input type="range" class="criterion-slider" min="0" max="10" value="${criteriaScores[c.key]??5}"
          id="cs-${c.key}" oninput="updateCritVal('${c.key}',this.value)" />
        <div class="criterion-val" id="cv-${c.key}">${criteriaScores[c.key]??5}</div>
      </div>
      <div style="display:grid;grid-template-columns:90px 1fr;gap:0.6rem;margin-bottom:0.4rem">
        <div></div>
        <input type="text" id="cn-${c.key}" placeholder="${c.hint}" value="${escH(criteriaNotes[c.key]||'')}"
          style="font-size:0.68rem;padding:0.3rem 0.6rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:6px;outline:none;font-family:'DM Mono',monospace" />
      </div>
    </div>`).join('');
}

function updateCritVal(key, val) {
  criteriaScores[key] = parseInt(val);
  document.getElementById('cv-'+key).textContent = val;
}

function openBoyleModal() {
  criteriaScores = {}; criteriaNotes = {};
  CRITERIA.forEach(c => { criteriaScores[c.key]=5; criteriaNotes[c.key]=''; });
  ['bf-restaurant','bf-cuisine','bf-date','bf-review'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('bf-revisit').value='yes';
  buildCriteriaForm();
  document.getElementById('boyle-modal').classList.add('open');
  setTimeout(()=>document.getElementById('bf-restaurant').focus(),100);
}

async function saveBoyleReview() {
  const food_name=document.getElementById('bf-restaurant').value.trim();
  if(!food_name){ document.getElementById('bf-restaurant').style.borderColor='#e05a5a'; return; }
  document.getElementById('bf-restaurant').style.borderColor='';

  const scores={}, notes={};
  CRITERIA.forEach(c=>{
    scores[c.key]=parseInt(document.getElementById('cs-'+c.key).value);
    notes[c.key]=document.getElementById('cn-'+c.key).value.trim();
  });
  const total=Object.values(scores).reduce((a,b)=>a+b,0);
  const avg=parseFloat((total/CRITERIA.length).toFixed(2));

  const saveBtn = document.querySelector('#boyle-modal .btn-primary');
  saveBtn.textContent='Saving...'; saveBtn.disabled=true;

  try {
    // 1. Insert review header
    const [review] = await sb('boyle_reviews','POST',{
      food_name,
      cuisine: document.getElementById('bf-cuisine').value.trim() || null,
      date_tasted: document.getElementById('bf-date').value.trim() || new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
      average_score: avg,
      verdict: document.getElementById('bf-review').value.trim() || null,
      revisit: document.getElementById('bf-revisit').value,
    });

    // 2. Insert all 14 criteria rows
    const criteriaRows = CRITERIA.map(c=>({
      review_id: review.id,
      criterion: c.key,
      score: scores[c.key],
      note: notes[c.key] || null,
    }));
    await sb('boyle_criteria','POST', criteriaRows);

    closeModal('boyle-modal');
    toast('Review logged!');
    renderReviews();
  } catch(e) { toast('Failed to save review', false); console.error(e); }
  finally { saveBtn.textContent='Log Review'; saveBtn.disabled=false; }
}

async function deleteReview(id) {
  try {
    // CASCADE on the DB handles boyle_criteria deletion
    await sb('boyle_reviews','DELETE',null,`?id=eq.${id}`);
    toast('Review deleted');
    renderReviews();
  } catch(e) { toast('Failed to delete', false); }
}

const RV_LABELS={yes:'Would Revisit ✓',maybe:'Maybe Revisit',no:'Would Not Revisit'};
const RV_CLS={yes:'rv-yes',maybe:'rv-maybe',no:'rv-no'};

function scoreColor(n) {
  if(n<=2) return '#888';
  if(n<=4) return '#e05a5a';
  if(n<=6) return '#e8c547';
  if(n<=8) return '#c8a96e';
  return '#7ec896';
}

async function renderReviews() {
  const grid=document.getElementById('reviews-grid');
  grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:3rem;font-size:0.8rem">Loading...</div>`;

  let reviews=[], criteriaAll=[];
  try {
    reviews = await sb('boyle_reviews','GET',null,'?order=created_at.desc');
    if(reviews.length>0){
      const ids = reviews.map(r=>`"${r.id}"`).join(',');
      criteriaAll = await sb('boyle_criteria','GET',null,`?review_id=in.(${ids})`);
    }
  } catch(e) { toast('Failed to load reviews', false); reviews=[]; }

  if(reviews.length===0){
    grid.innerHTML='<div class="reviews-empty"><span class="big">CB</span>No reviews yet.<br>Start logging your culinary adventures!</div>'; return;
  }

  grid.innerHTML=reviews.map(r=>{
    const rc = criteriaAll.filter(c=>c.review_id===r.id);
    // Build score map from DB rows
    const scoreMap={}, noteMap={};
    rc.forEach(c=>{ scoreMap[c.criterion]=c.score; noteMap[c.criterion]=c.note||''; });

    const sorted = CRITERIA.map(c=>({...c, score:scoreMap[c.key]??0, note:noteMap[c.key]||''}))
      .filter(c=>c.score>0).sort((a,b)=>b.score-a.score);
    const topCrit = sorted.slice(0,6);

    const barsHtml = topCrit.map(c=>`
      <div class="crit-bar-row">
        <div class="crit-bar-label">${c.label}</div>
        <div class="crit-bar-track"><div class="crit-bar-fill" style="width:${c.score*10}%;background:${scoreColor(c.score)}"></div></div>
        <div class="crit-bar-val" style="color:${scoreColor(c.score)}">${c.score}</div>
      </div>
      ${c.note?`<div class="crit-note-row">${escH(c.note)}</div>`:''}`).join('');

    return `
    <div class="review-card">
      <button class="review-del" onclick="deleteReview('${r.id}')">×</button>
      <div class="review-card-top">
        <div class="review-restaurant">${escH(r.food_name)}</div>
        ${r.cuisine?'<div class="review-cuisine">'+escH(r.cuisine)+'</div>':''}
        <div style="display:flex;align-items:baseline;gap:0.5rem;margin-top:0.6rem">
          <span class="boyle-score" style="font-size:2rem">${r.average_score??'?'}</span>
          <span style="font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase">/ 10 avg</span>
        </div>
      </div>
      <div class="criteria-bars">${barsHtml}</div>
      ${r.verdict?`<div class="review-body"><div class="review-quote">"${escH(r.verdict)}"</div></div>`:''}
      <div class="review-footer">
        <span class="review-date">${escH(r.date_tasted||'')}</span>
        <span class="review-revisit ${RV_CLS[r.revisit]}">${RV_LABELS[r.revisit]}</span>
      </div>
    </div>`;
  }).join('');
}

// ── INIT ──
showPage('schedule');
renderSchedule();
renderTodos();
renderReviews();
initSettings();
</script>
